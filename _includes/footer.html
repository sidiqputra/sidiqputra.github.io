<footer class="site-footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-column footer-about">
                <h3>{{ site.title }}</h3>
                <p>{{ site.tagline }}</p>
            </div>

            <div class="footer-column">
                <h3>Navigate</h3>
                <ul class="footer-links">
                    <li><a href="{{ "/" | relative_url }}#about">About</a></li>
                    <li><a href="{{ "/" | relative_url }}#experience">Experience</a></li>
                    <li><a href="{{ "/" | relative_url }}#skills">Skills</a></li>
                    <li><a href="{{ "/" | relative_url }}#projects">Projects</a></li>
                </ul>
            </div>

            <div class="footer-column">
                <h3>Contact Info</h3>
                <ul class="footer-contact">
                    <li>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M8 0C5.2 0 3 2.2 3 5c0 3.9 5 11 5 11s5-7.1 5-11c0-2.8-2.2-5-5-5zm0 7.5c-1.4 0-2.5-1.1-2.5-2.5S6.6 2.5 8 2.5s2.5 1.1 2.5 2.5S9.4 7.5 8 7.5z"/>
                        </svg>
                        <span>{{ site.address }}</span>
                    </li>
                    <li>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <a href="mailto:{{ site.email }}">{{ site.email }}</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="footer-divider"></div>

        <div class="footer-bottom">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}.</p>
        </div>
    </div>
</footer>
